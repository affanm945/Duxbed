  <style>
    .underline-word {
      color: #E69B0A !important;
    }

    .wow.fadeIn.word-4 {
      /* text-decoration: underline !important; */
      /* color: #f72c30 !important;     */
    }

    .wow.fadeIn.word-5 {
      /* text-decoration: underline !important; */
      /* color: #f72c30 !important;     */
    }

    .locker .locker-title {
      font-size: 64px;
    }

    body {
      margin: 0;
      /* font-family: Arial, sans-serif; */
    }

    .content {
      height: 1500px;
      padding: 20px;
      background: #f4f4f4;
    }

    .footer {
      height: 200px;
      background: #222;
      color: #fff;
      text-align: center;
      padding: 50px 20px;
    }

    .slide-in {
      border: 2px solid #f99fa2;
      position: fixed;
      right: -100%;
      bottom: 50px;
      background: #fff;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
      padding: 20px;
      /* border-radius: 8px; */
      display: flex;
      align-items: center;
      gap: 20px;
      transition: right 0.6s ease;
      z-index: 999;
      width: 20%;
      max-width: 500px;
      flex-direction: column;
    }

    .slide-in.visible {
      right: 20px;
    }

    .slide-in img {
      width: 140px;
      height: 140px;
      object-fit: cover;
      border-radius: 8px;
    }

    .slide-in .text {
      flex: 1;
    }

    @media (max-width: 600px) {
      .slide-in {
        flex-direction: column;
        align-items: center;
        width: 60%;
      }

      .slide-in img {
        width: 100%;
        height: auto;
      }
    }

    @media(max-width:1366px) {
      .slide-in {
        width: 60%;
      }
    }


    .mobile-only {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-only {
        display: block;
      }
    }
  </style>
